<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zprávy — SPARR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link rel="stylesheet" href="sparr.css">
<style>
body{overflow:hidden;}
.layout{display:grid;grid-template-columns:300px 1fr;height:100vh;padding-top:68px;}

/* SIDEBAR */
.sidebar{background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--text);margin-bottom:10px;}
.search-box{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;transition:border-color .2s;}
.search-box:focus-within{border-color:rgba(245,149,26,.4);}
.search-box input{background:transparent;border:none;outline:none;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);flex:1;cursor:none;}
.search-box input::placeholder{color:rgba(240,240,240,.3);}
.conv-list{flex:1;overflow-y:auto;}
.new-btn{margin:10px 14px 6px;}

/* Konverzace */
.conv-row{display:flex;align-items:center;gap:11px;padding:11px 14px;cursor:none;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.03);position:relative;}
.conv-row:hover{background:rgba(255,255,255,.03);}
.conv-row.active{background:rgba(245,149,26,.07);}
.conv-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--orange);border-radius:0 2px 2px 0;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-weight:600;font-size:13px;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.conv-time{font-size:10px;color:rgba(240,240,240,.3);flex-shrink:0;margin-left:4px;}
.conv-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.conv-empty{padding:36px 14px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7;}

/* CHAT */
.chat{display:flex;flex-direction:column;background:var(--dark);min-height:0;}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);}
.chat-head{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--dark2);flex-shrink:0;display:flex;align-items:center;gap:12px;min-height:64px;}
.chat-head-name{font-weight:600;font-size:15px;color:var(--text);}
.chat-head-sub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
.date-sep{text-align:center;font-size:11px;color:rgba(240,240,240,.3);letter-spacing:1px;text-transform:uppercase;margin:4px 0;}
.msg{display:flex;gap:8px;max-width:70%;}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;word-break:break-word;color:var(--text);}
.msg.them .msg-bubble{background:#1e1e1e;border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.me   .msg-bubble{background:linear-gradient(135deg,#f5951a,#ab2e2e);color:white;border-bottom-right-radius:4px;}
.msg-ts{font-size:10px;color:rgba(240,240,240,.3);margin-top:3px;display:flex;gap:3px;}
.msg.me .msg-ts{justify-content:flex-end;}
.chat-input{padding:12px 20px;border-top:1px solid var(--border);background:var(--dark2);flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:14px;padding:8px 8px 8px 16px;transition:border-color .2s;}
.input-row:focus-within{border-color:rgba(245,149,26,.5);background:rgba(245,149,26,.02);}
.input-row textarea{flex:1;background:transparent;border:none;outline:none;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);resize:none;min-height:24px;max-height:120px;line-height:1.5;cursor:none;padding:3px 0;}
.input-row textarea::placeholder{color:rgba(240,240,240,.3);}
.send-btn{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#f5951a,#ab2e2e);border:none;cursor:none;font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.send-btn:hover{box-shadow:0 4px 16px rgba(245,149,26,.35);}
.send-btn:active{transform:scale(.95);}
.send-btn:disabled{opacity:.4;}
.input-hint{font-size:11px;color:rgba(240,240,240,.25);text-align:center;margin-top:5px;}

@media(max-width:700px){.layout{grid-template-columns:1fr;}body{overflow:auto;}}
</style>
</head>
<body>
<div id="sPageLoader" class="s-page-loader"><div class="logo">SPARR</div><div class="s-loader"></div></div>
<div class="s-cursor" id="sCursor"></div>
<div class="s-cursor-ring" id="sCursorRing"></div>
<div class="s-toast-wrap" id="toastWrap"></div>

<nav class="s-nav" id="mainNav" style="z-index:300">
  <a class="s-logo" href="index.html">SPARR</a>
  <div class="s-nav-links">
    <a href="index.html">Home</a>
    <a href="profiles.html">Fighters</a>
    <a href="messages.html" class="active">Zprávy</a>
    <a href="my-profile.html">Profil</a>
  </div>
  <div class="s-nav-right" id="navRight"></div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-title">Zprávy</div>
      <div class="search-box">
        <span style="color:rgba(240,240,240,.3)">🔍</span>
        <input type="text" id="srch" placeholder="Hledat…" oninput="filterList()">
      </div>
    </div>
    <button class="btn btn-ghost btn-sm new-btn" onclick="openModal('newModal')">+ Nová konverzace</button>
    <div class="conv-list" id="convList">
      <div class="conv-empty"><div class="s-loader" style="margin:0 auto 12px"></div>Načítám…</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chatArea">
    <div class="chat-empty">
      <div style="font-size:52px;opacity:.2">💬</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--muted)">Vyber konverzaci</div>
      <div style="font-size:13px;color:rgba(240,240,240,.3)">nebo začni novou</div>
    </div>
  </div>
</div>

<!-- NOVÁ KONVERZACE -->
<div class="s-modal-overlay" id="newModal" onclick="if(event.target===this)closeModal('newModal')">
  <div class="s-modal">
    <div class="s-modal-head">
      <div class="s-modal-title">Nová zpráva</div>
      <button class="s-modal-close" onclick="closeModal('newModal')">✕</button>
    </div>
    <div class="s-modal-body">
      <div class="form-group">
        <label class="form-label">Hledat bojovníka</label>
        <input type="text" class="form-input" id="fightQ" placeholder="Jméno, město, sport…" oninput="debSearch()">
      </div>
      <div id="fightRes" style="display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:380px;overflow-y:auto"></div>
    </div>
  </div>
</div>

<script type="module">
import { initUI, showToast, openModal, closeModal } from './ui.js';
import {
  onAuthReady, sparrLogout,
  getAllFighters, getProfile,
  sendMessage, listenMessages, listenChats, markRead, getChatId,
  initials, timeAgo, esc
} from './sparr.js';

initUI();

// state
let _u = null, _p = null;
let _chats = [];
let _active = null;          // { uid, name, chatId }
let _unsubMsgs = null;       // real-time zprávy
let _unsubChats = null;      // real-time seznam konverzací

// ── AUTH ─────────────────────────────────────────────────
onAuthReady(async (user, profile) => {
  if (!user) { location.href = 'index.html'; return; }
  _u = user; _p = profile;

  // nav
  const av = profile?.photoURL ? `<img src="${profile.photoURL}" alt="">` : initials(profile?.name || '?');
  document.getElementById('navRight').innerHTML = `
    <a href="my-profile.html" class="nav-user-avatar">${av}</a>
    <button class="btn btn-outline btn-sm" id="lob">Odhlásit</button>`;
  document.getElementById('lob').addEventListener('click', sparrLogout);

  // ── KLÍČOVÁ OPRAVA: real-time listener na konverzace ─────
  // Sidebar se aktualizuje automaticky kdykoli přijde/odejde zpráva
  _unsubChats = listenChats(user.uid, chats => {
    _chats = chats;
    renderList(chats);
  });

  // Auto-open z URL
  const sp = new URLSearchParams(location.search);
  if (sp.get('uid') && sp.get('name')) {
    setTimeout(() => openChat(sp.get('uid'), decodeURIComponent(sp.get('name')), null), 500);
  }
});

// ── SEZNAM KONVERZACÍ ─────────────────────────────────────
function renderList(chats) {
  const list = document.getElementById('convList');
  const q = document.getElementById('srch').value.toLowerCase();
  const data = q ? chats.filter(c => {
    const ou = c.participants?.find(u => u !== _u.uid) || '';
    return (c.participantNames?.[ou] || '').toLowerCase().includes(q);
  }) : chats;

  if (!data.length) {
    list.innerHTML = `<div class="conv-empty">${q ? 'Nic nenalezeno' : 'Žádné konverzace.<br>Začni kliknutím na<br><strong>+ Nová konverzace</strong>'}</div>`;
    return;
  }

  list.innerHTML = data.map(c => {
    const ou   = c.participants?.find(u => u !== _u.uid) || '';
    const name = c.participantNames?.[ou] || 'Fighter';
    const unrd = c[`unread_${_u.uid}`];
    const actv = _active?.uid === ou;
    return `
      <div class="conv-row ${actv ? 'active' : ''}" data-uid="${ou}"
           onclick="openChat('${ou}','${esc(name)}','${c.id}')">
        <div class="s-avatar s-avatar-md">${initials(name)}</div>
        <div class="conv-info">
          <div class="conv-name">
            <span>${esc(name)}</span>
            <span class="conv-time">${c.lastMessageTs ? timeAgo(c.lastMessageTs) : ''}</span>
          </div>
          <div class="conv-preview">${esc((c.lastMessage || 'Začněte konverzaci').slice(0, 45))}</div>
        </div>
        ${unrd ? '<div class="conv-dot"></div>' : ''}
      </div>`;
  }).join('');
}

window.filterList = () => renderList(_chats);

// ── OTEVŘÍT KONVERZACI ────────────────────────────────────
window.openChat = function(uid, name, chatId) {
  if (!_u) return;
  if (_unsubMsgs) { _unsubMsgs(); _unsubMsgs = null; }

  _active = { uid, name, chatId };
  const cid = chatId || getChatId(_u.uid, uid);
  markRead(cid, _u.uid);

  // označ aktivní řádek
  document.querySelectorAll('.conv-row').forEach(r =>
    r.classList.toggle('active', r.dataset.uid === uid));

  // vykresli chat area
  document.getElementById('chatArea').innerHTML = `
    <div class="chat-head">
      <div class="s-avatar s-avatar-md">${initials(name)}</div>
      <div style="flex:1">
        <div class="chat-head-name">${esc(name)}</div>
        <div class="chat-head-sub"><span class="status-dot online"></span>Online</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <a href="profile.html?uid=${uid}" class="btn btn-ghost btn-sm">Profil</a>
      </div>
    </div>
    <div class="chat-msgs" id="msgs">
      <div style="flex:1;display:flex;align-items:center;justify-content:center"><div class="s-loader"></div></div>
    </div>
    <div class="chat-input">
      <div class="input-row">
        <textarea id="txtIn" placeholder="Napiš zprávu… (Enter = odeslat)" rows="1"
          oninput="autoH(this)" onkeydown="onKey(event)"></textarea>
        <button class="send-btn" id="sndBtn">➤</button>
      </div>
      <div class="input-hint">Enter = odeslat · Shift+Enter = nový řádek</div>
    </div>`;

  document.getElementById('sndBtn').addEventListener('click', doSend);

  // real-time zprávy
  _unsubMsgs = listenMessages(_u.uid, uid, renderMsgs);

  closeModal('newModal');
};

// ── VYKRESLENÍ ZPRÁV ──────────────────────────────────────
function renderMsgs(msgs) {
  const box = document.getElementById('msgs');
  if (!box) return;
  const atBot = box.scrollHeight - box.scrollTop - box.clientHeight < 100;

  if (!msgs.length) {
    box.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:rgba(240,240,240,.3)"><div style="font-size:36px">👋</div><div style="font-size:13px">Napiš první zprávu!</div></div>`;
    return;
  }

  let lastD = '';
  box.innerHTML = msgs.map(m => {
    const me = m.fromUid === _u.uid;
    const d  = new Date(m.ts || Date.now());
    const ds = d.toLocaleDateString('cs-CZ', { weekday:'short', month:'short', day:'numeric' });
    const ts = d.toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' });
    let sep = '';
    if (ds !== lastD) { sep = `<div class="date-sep">${ds}</div>`; lastD = ds; }
    return `${sep}
      <div class="msg ${me ? 'me' : 'them'}">
        ${!me ? `<div class="s-avatar s-avatar-sm">${initials(m.fromName)}</div>` : ''}
        <div>
          <div class="msg-bubble">${esc(m.text)}</div>
          <div class="msg-ts">${ts}${me ? ' <span style="opacity:.5">✓</span>' : ''}</div>
        </div>
      </div>`;
  }).join('');

  if (atBot || msgs.length <= 15) box.scrollTop = box.scrollHeight;
}

// ── ODESLÁNÍ ZPRÁVY ───────────────────────────────────────
async function doSend() {
  if (!_active || !_u) return;
  const ta = document.getElementById('txtIn');
  if (!ta) return;
  const txt = ta.value.trim();
  if (!txt) return;

  const btn = document.getElementById('sndBtn');
  btn.disabled = true;
  ta.value = '';
  ta.style.height = '';

  try {
    let toEmail = '';
    try { const tp = await getProfile(_active.uid); toEmail = tp?.email || ''; } catch {}
    await sendMessage(_u.uid, _p?.name || 'Fighter', _active.uid, _active.name, toEmail, txt);
    // listenMessages + listenChats se automaticky aktualizují
  } catch(e) {
    showToast('Zprávu se nepodařilo odeslat: ' + (e.message || e), 'error');
    ta.value = txt;
    console.error('send error:', e);
  }
  btn.disabled = false;
  ta.focus();
}

window.onKey  = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } };
window.autoH  = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };

// ── HLEDÁNÍ FIGHTERŮ ──────────────────────────────────────
let _st;
window.debSearch = () => { clearTimeout(_st); _st = setTimeout(doSearch, 380); };

async function doSearch() {
  const q   = (document.getElementById('fightQ').value || '').trim().toLowerCase();
  const box = document.getElementById('fightRes');
  if (q.length < 2) { box.innerHTML = ''; return; }
  box.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:8px;color:var(--muted);font-size:13px"><div class="s-loader s-loader-sm"></div>Hledám…</div>`;
  try {
    const all = await getAllFighters({ limit: 50 });
    const hit = all.filter(f =>
      f.uid !== _u.uid &&
      (f.name?.toLowerCase().includes(q) || f.city?.toLowerCase().includes(q) || f.sport?.toLowerCase().includes(q))
    ).slice(0, 8);

    if (!hit.length) { box.innerHTML = `<div style="padding:14px;text-align:center;color:var(--muted);font-size:13px">Nenalezeno pro "${esc(q)}"</div>`; return; }
    box.innerHTML = hit.map(f => `
      <div class="conv-row" style="border-radius:10px;border:1px solid var(--border)"
           onclick="openChat('${f.uid}','${esc(f.name)}',null)">
        <div class="s-avatar s-avatar-md">${f.photoURL ? `<img src="${f.photoURL}" alt="">` : initials(f.name)}</div>
        <div class="conv-info">
          <div class="conv-name"><span>${esc(f.name)}</span></div>
          <div class="conv-preview">${esc(f.sport || '—')} · ${esc(f.city || '—')}</div>
        </div>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--orange);flex-shrink:0">Napsat →</span>
      </div>`).join('');
  } catch(e) {
    box.innerHTML = `<div style="padding:14px;color:var(--error);font-size:13px">Chyba: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
